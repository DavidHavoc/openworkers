services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  cli:
    build:
      context: .
      dockerfile: Dockerfile
    image: openworkers
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: openworkers
    command: python -m apps.mcp_server.main
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
    stdin_open: true
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools

volumes:
  qdrant_data:
