name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature for OpenWorkers.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What is the current limitation?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the feature. What would it look like? How would it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches or workarounds you've thought about.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How big is this change?
      options:
        - "Small — single file or module"
        - "Medium — a few interconnected files"
        - "Large — new subsystem or component"
    validations:
      required: true
