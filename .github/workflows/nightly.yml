name: Nightly Integration

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  live-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests with live APIs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DRY_RUN: "false"
        run: pytest tests/test_integrations.py -v -m "not slow" --timeout=120

      - name: Run smoke tests with live APIs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DRY_RUN: "false"
        run: pytest tests/test_smoke.py -v --timeout=120

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t openworkers:nightly .

      - name: Verify Docker image
        run: |
          docker run --rm openworkers:nightly python -c "
          from core.schemas import ResearchPlan, LitMap, CritiqueResult
          print('Docker image OK: all core schemas importable')
          "
